<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- EcoCash brand favicon -->
  <defs>
    <clipPath id="circleClip">
      <circle cx="32" cy="32" r="30"/>
    </clipPath>
  </defs>
  <!-- Green top accent strip -->
  <g clip-path="url(#circleClip)">
    <rect x="0" y="0" width="64" height="5" fill="#2E8B57"/>
  </g>
  <!-- Blue background -->
  <circle cx="32" cy="32" r="30" fill="#004990"/>
  <!-- Red ring -->
  <circle cx="32" cy="32" r="29" fill="none" stroke="#E4002B" stroke-width="3"/>
  <!-- White E (EcoCash) -->
  <text x="32" y="42" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif"
        font-weight="900" font-size="30" fill="#ffffff">E</text>
</svg>

